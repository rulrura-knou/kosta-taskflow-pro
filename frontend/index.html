<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow Pro</title>
  <!-- 테마 초기화 — FOUC 방지를 위해 Tailwind보다 먼저 실행 -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.classList.toggle('dark', (saved ?? system) === 'dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 font-sans transition-colors duration-200">

  <!-- 헤더 -->
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md
                 border-b border-slate-200/60 dark:border-slate-700/60">
    <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between">
      <h1 class="text-lg font-bold text-slate-800 dark:text-slate-100 tracking-tight">
        ⚡ TaskFlow Pro
      </h1>
      <button id="theme-btn" onclick="toggleTheme()"
              class="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-xl
                     text-slate-500 hover:text-slate-800 dark:hover:text-slate-100
                     hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
              aria-label="테마 전환">
        <!-- 라이트 모드일 때: 달 아이콘(→ 다크로 전환) -->
        <svg id="icon-moon" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
        <!-- 다크 모드일 때: 태양 아이콘(→ 라이트로 전환) -->
        <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707
                   m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">

    <!-- 태스크 추가 폼 -->
    <section class="bg-white/70 dark:bg-slate-800/70 backdrop-blur-md rounded-2xl shadow-lg
                    border border-slate-200/60 dark:border-slate-700/60 p-5">
      <h2 class="text-xs font-semibold uppercase tracking-wide
                 text-slate-500 dark:text-slate-400 mb-3">새 태스크 추가</h2>
      <form id="add-form" class="flex flex-col sm:flex-row gap-3">
        <input type="text" id="add-title" placeholder="태스크 제목 *"
               class="flex-1 min-h-[44px] px-4 rounded-xl
                      border border-slate-200 dark:border-slate-600
                      bg-white dark:bg-slate-700
                      text-slate-800 dark:text-slate-100
                      placeholder-slate-400 dark:placeholder-slate-500
                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        <input type="datetime-local" id="add-due-at"
               class="min-h-[44px] px-4 rounded-xl
                      border border-slate-200 dark:border-slate-600
                      bg-white dark:bg-slate-700
                      text-slate-800 dark:text-slate-100
                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        <select id="add-status"
                class="min-h-[44px] px-4 rounded-xl
                       border border-slate-200 dark:border-slate-600
                       bg-white dark:bg-slate-700
                       text-slate-800 dark:text-slate-100
                       focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
          <option value="todo">할 일</option>
          <option value="in_progress">진행 중</option>
          <option value="done">완료</option>
        </select>
        <button type="submit"
                class="min-h-[44px] px-6 bg-blue-500 hover:bg-blue-600 active:bg-blue-700
                       text-white font-semibold rounded-xl transition-colors whitespace-nowrap">
          추가
        </button>
      </form>
      <p id="add-error" class="hidden mt-2 text-xs text-red-500"></p>
    </section>

    <!-- 태스크 목록 -->
    <section>
      <h2 class="text-xs font-semibold uppercase tracking-wide
                 text-slate-500 dark:text-slate-400 mb-3">태스크 목록</h2>
      <div id="task-list"
           class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        <div class="col-span-full flex justify-center py-12 text-slate-400 dark:text-slate-500">
          <span class="text-sm">불러오는 중...</span>
        </div>
      </div>
    </section>

  </main>

  <!-- 수정 모달 -->
  <div id="edit-modal"
       class="hidden fixed inset-0 z-50 flex items-center justify-center p-4"
       onclick="if(event.target===this)closeEditModal()">
    <!-- 배경 오버레이 -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <!-- 모달 카드 -->
    <div class="relative w-full max-w-md bg-white dark:bg-slate-800
                rounded-2xl shadow-2xl border border-slate-200/60 dark:border-slate-700/60
                p-6 z-10">
      <h2 class="text-base font-semibold text-slate-800 dark:text-slate-100 mb-4">태스크 수정</h2>
      <input type="hidden" id="edit-id">
      <div class="flex flex-col gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">제목 *</label>
          <input type="text" id="edit-title"
                 class="w-full min-h-[44px] px-3 py-2 rounded-xl
                        border border-slate-200 dark:border-slate-600
                        bg-white dark:bg-slate-700
                        text-slate-800 dark:text-slate-100
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">설명</label>
          <textarea id="edit-description" rows="3"
                    class="w-full px-3 py-2 rounded-xl
                           border border-slate-200 dark:border-slate-600
                           bg-white dark:bg-slate-700
                           text-slate-800 dark:text-slate-100
                           focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">상태</label>
          <select id="edit-status"
                  class="w-full min-h-[44px] px-3 py-2 rounded-xl
                         border border-slate-200 dark:border-slate-600
                         bg-white dark:bg-slate-700
                         text-slate-800 dark:text-slate-100
                         focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="todo">할 일</option>
            <option value="in_progress">진행 중</option>
            <option value="done">완료</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">마감시각</label>
          <input type="datetime-local" id="edit-due-at"
                 class="w-full min-h-[44px] px-3 py-2 rounded-xl
                        border border-slate-200 dark:border-slate-600
                        bg-white dark:bg-slate-700
                        text-slate-800 dark:text-slate-100
                        focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
      <p id="edit-error" class="hidden mt-2 text-xs text-red-500"></p>
      <div class="flex gap-2 mt-5">
        <button onclick="saveEdit()"
                class="flex-1 min-h-[44px] bg-blue-500 hover:bg-blue-600
                       text-white font-semibold rounded-xl transition-colors">
          저장
        </button>
        <button onclick="closeEditModal()"
                class="flex-1 min-h-[44px] bg-slate-100 hover:bg-slate-200
                       dark:bg-slate-700 dark:hover:bg-slate-600
                       text-slate-700 dark:text-slate-200
                       font-semibold rounded-xl transition-colors">
          취소
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
